name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: End-to-end check
        run: |
          OUTPUT=$(echo '{"model":{"id":"claude-opus-4-6"},"cost":{"total_cost_usd":1.23,"total_lines_added":10,"total_lines_removed":2},"rate_limits":{"five_hour":{"used_percentage":30},"seven_day":{"used_percentage":50}}}' | node dist/index.js)
          LINE_COUNT=$(echo "$OUTPUT" | wc -l | tr -d ' ')
          if [ "$LINE_COUNT" -lt 3 ]; then
            echo "Expected >= 3 lines, got $LINE_COUNT"
            echo "$OUTPUT"
            exit 1
          fi
          echo "$OUTPUT"
